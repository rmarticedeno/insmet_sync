services:
  scanner:
    build: .
    environment:
      PYTHONUNBUFFERED: 1
      DATA_ROOT: /data
      FTP_DATA: /data/ftp
      REPORT_DATA: /data/ftp/uploads
      BULLETIN_DATA: /data/ftp/bulletins
      REPORT_BACKUP_DATA: /data/ftp/processed
      INVALID_PROCESSED_REPORTS: /data/ftp/invalid
      REJECTED_REPORT_DATA: /data/ftp/invalid
      RETRY_REPORT_DATA: /data/ftp/retry
      CLAIMED_REPORT_DATA: /data/ftp/processing
      PROCESSING_FOLDER: /data/ftp/current-bulletins
      DESTINATION_FOLDER: ${DESTINATION_FOLDER}
      DB_Table: ${DB_Table}
      DB_CONNSTRING: ${DB_CONNSTRING}
      RETRY_BATCH_SIZE: ${RETRY_BATCH_SIZE:-20}
      CLEANUP_AGE_DAYS: ${CLEANUP_AGE_DAYS:-1}
      UPLOAD_STABILITY_WAIT_SECONDS: ${UPLOAD_STABILITY_WAIT_SECONDS:-30}
      UPLOAD_STABILITY_CHECK_INTERVAL_SECONDS: ${UPLOAD_STABILITY_CHECK_INTERVAL_SECONDS:-2}
      DB_CONNECT_TIMEOUT_SECONDS: ${DB_CONNECT_TIMEOUT_SECONDS:-10}
      DB_QUERY_TIMEOUT_SECONDS: ${DB_QUERY_TIMEOUT_SECONDS:-30}
    volumes:
      - ${DATA_ROOT:-./localdata}:/data
      - ${FTP_HOST_PATH:-./localdata/ftp}:/data/ftp
    restart: always

  ftp:
    build:
      context: .
      dockerfile: ftp.Dockerfile
      args:
        CERT_FINGERPRINT: ${CERT_FINGERPRINT}
    container_name: ftp
    environment:
      FTP_USER: ${FTP_USER}
      FTP_PASS: ${FTP_PASS}
      PASV_ADDRESS: ${FTP_ADDR}
      PASV_MIN_PORT: ${FTP_MIN_PORT}
      PASV_MAX_PORT: ${FTP_MAX_PORT}
      LOG_STDOUT: YES
      FTP_MODE: ${FTP_MODE}
    ports:
      - "20:20"
      - "21:21"
      - "${FTP_MIN_PORT}-${FTP_MAX_PORT}:${FTP_MIN_PORT}-${FTP_MAX_PORT}"
      - "990:990"
    volumes:
      - ${FTP_HOST_PATH:-./localdata/ftp}:/home/vsftpd/${FTP_USER}
    restart: always

  scheduler:
    build: .
    command: ["python", "-m", "src.scheduler_service"]
    environment:
      PYTHONUNBUFFERED: 1
      DATA_ROOT: /data
      FTP_DATA: /data/ftp
      REPORT_DATA: /data/ftp/uploads
      BULLETIN_DATA: /data/ftp/bulletins
      REPORT_BACKUP_DATA: /data/ftp/processed
      INVALID_PROCESSED_REPORTS: /data/ftp/invalid
      REJECTED_REPORT_DATA: /data/ftp/invalid
      RETRY_REPORT_DATA: /data/ftp/retry
      CLAIMED_REPORT_DATA: /data/ftp/processing
      PROCESSING_FOLDER: /data/ftp/current-bulletins
      DESTINATION_FOLDER: ${DESTINATION_FOLDER}
      DB_Table: ${DB_Table}
      DB_CONNSTRING: ${DB_CONNSTRING}
      RETRY_BATCH_SIZE: ${RETRY_BATCH_SIZE:-20}
      CLEANUP_AGE_DAYS: ${CLEANUP_AGE_DAYS:-1}
      BULLETIN_JOB_TIMEOUT_SECONDS: ${BULLETIN_JOB_TIMEOUT_SECONDS:-300}
      RETRY_JOB_TIMEOUT_SECONDS: ${RETRY_JOB_TIMEOUT_SECONDS:-240}
      CLEANUP_JOB_TIMEOUT_SECONDS: ${CLEANUP_JOB_TIMEOUT_SECONDS:-45}
    volumes:
      - ${DATA_ROOT:-./localdata}:/data
      - ${FTP_HOST_PATH:-./localdata/ftp}:/data/ftp
    restart: always
